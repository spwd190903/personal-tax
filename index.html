<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-lg bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden mb-4">
        
        <div id="login-view" class="p-8 hidden">
            <h1 class="text-3xl font-bold text-center text-indigo-400 mb-2">🎮 Game Portal</h1>
            <p class="text-slate-400 text-sm text-center mb-8">เข้าสู่ระบบเพื่อเริ่มการผจญภัยของคุณ</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">ชื่อผู้ใช้ (Username)</label>
                    <input type="text" id="login-username" placeholder="กรอกชื่อผู้ใช้ของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">รหัสผ่าน (Password)</label>
                    <input type="password" id="login-password" placeholder="กรอกรหัสผ่านของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>

                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition duration-200 mt-2">
                    ลงชื่อเข้าใช้
                </button>

                <div class="text-center pt-4 border-t border-slate-700/50 mt-4">
                    <button onclick="showAuthPage('register')" class="text-sm text-indigo-400 hover:underline">
                        ยังไม่มีบัญชี? สมัครสมาชิกใหม่ที่นี่
                    </button>
                </div>
            </div>
        </div>

        <div id="register-view" class="p-8 hidden">
            <h1 class="text-2xl font-bold text-center text-emerald-400 mb-2">📝 สมัครสมาชิกใหม่</h1>
            <p class="text-slate-400 text-sm text-center mb-6">กรอกข้อมูลให้ครบถ้วนเพื่อสร้างบัญชี</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">ชื่อผู้ใช้ (Username) <span class="text-xs text-rose-400">(ใช้สำหรับเข้าสู่ระบบ / แก้ไขไม่ได้)</span></label>
                    <input type="text" id="reg-username" placeholder="ตั้งชื่อผู้ใช้ภาษาอังกฤษ/ตัวเลข" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">รหัสผ่าน (Password)</label>
                    <input type="password" id="reg-password" placeholder="ตั้งรหัสผ่านของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">ชื่อเล่น (Nickname) <span class="text-xs text-emerald-400">(เปลี่ยนได้ตลอดเวลาในเกม)</span></label>
                    <input type="text" id="reg-nickname" placeholder="ตั้งชื่อเล่นของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="reg-phone" placeholder="กรอกเบอร์โทรศัพท์ของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">สังกัด / หน่วยงาน / ทีม</label>
                    <input type="text" id="reg-affiliation" placeholder="ระบุสังกัดของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>

                <button onclick="handleRegister()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-lg transition duration-200 mt-2">
                    สร้างบัญชีผู้ใช้
                </button>

                <div class="text-center pt-4 border-t border-slate-700/50 mt-4">
                    <button onclick="showAuthPage('login')" class="text-sm text-emerald-400 hover:underline">
                        มีบัญชีอยู่แล้ว? กลับไปหน้าเข้าสู่ระบบ
                    </button>
                </div>
            </div>
        </div>

        <div id="player-view" class="p-8 hidden max-w-5xl">
            <div class="flex flex-col md:flex-row md:items-center justify-between border-b border-slate-700 pb-6 mb-6 gap-4">
                <div>
                    <div class="flex items-baseline gap-2 flex-wrap">
                        <h2 class="text-2xl font-bold text-indigo-400" id="player-display-nickname">ชื่อเล่น</h2>
                        <span class="text-xs text-slate-400 bg-slate-700/50 px-2 py-0.5 rounded" id="player-display-username">@username</span>
                        <button onclick="toggleEditNickname()" class="text-[11px] bg-slate-700 hover:bg-slate-600 px-2 py-0.5 rounded text-slate-300">เปลี่ยนชื่อเล่น</button>
                    </div>
                    <p class="text-sm text-slate-300 mt-1" id="player-display-affiliation">สังกัด: -</p>
                    <p class="text-xs text-slate-500" id="player-display-phone">เบอร์โทร: -</p>
                    
                    <div id="edit-nickname-box" class="hidden mt-3 flex gap-2">
                        <input type="text" id="new-nickname-input" class="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none">
                        <button onclick="saveNewNickname()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded text-xs font-medium">บันทึก</button>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="bg-slate-700 px-4 py-2 rounded-xl text-center min-w-[100px]">
                        <p class="text-xs text-slate-400">คะแนนสะสม</p>
                        <p class="text-xl font-bold text-amber-400" id="player-score">0</p>
                    </div>
                    <div class="bg-slate-700 px-4 py-2 rounded-xl text-center min-w-[100px]">
                        <p class="text-xs text-slate-400">ด่านปัจจุบัน</p>
                        <p class="text-xl font-bold text-cyan-400" id="player-level">ด่าน 1</p>
                    </div>
                </div>
            </div>

            <h3 class="text-lg font-semibold text-slate-300 mb-6 text-center">🗺️ แผนที่การผจญภัย (กรุณาเล่นเรียงตามลำดับ)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button id="btn-lv1" onclick="playGame(1)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🌲</span>
                    <span>ด่านที่ 1</span>
                    <span class="text-xs font-normal" id="status-lv1">พร้อมเล่น</span>
                </button>
                <button id="btn-lv2" onclick="playGame(2)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🌋</span>
                    <span>ด่านที่ 2</span>
                    <span class="text-xs font-normal" id="status-lv2">ล็อกอยู่</span>
                </button>
                <button id="btn-lv3" onclick="playGame(3)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🧊</span>
                    <span>ด่านที่ 3</span>
                    <span class="text-xs font-normal" id="status-lv3">ล็อกอยู่</span>
                </button>
                <button id="btn-lv4" onclick="playGame(4)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🏰</span>
                    <span>ด่านที่ 4</span>
                    <span class="text-xs font-normal" id="status-lv4">ล็อกอยู่</span>
                </button>
            </div>

            <div class="flex justify-between items-center border-t border-slate-700 pt-6">
                <button onclick="resetGameProgress()" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
                    🔄 เริ่มเล่นใหม่ทั้งหมด (ล้างคะแนน)
                </button>
                <button onclick="logout()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
                    ออกจากระบบ
                </button>
            </div>
        </div>

        <div id="admin-view" class="p-8 hidden max-w-5xl">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-red-400">🕵️ ระบบจัดการแดชบอร์ดแอดมิน</h2>
                    <p class="text-sm text-slate-400 mt-1">จำนวนสมาชิกในระบบทั้งหมด: <span id="admin-total-users" class="font-bold text-white">0</span> คน</p>
                </div>
                <button onclick="logout()" class="bg-slate-700 hover:bg
