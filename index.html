<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal & Admin System (Updated)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <div id="auth-view" class="p-8 hidden">
            <h1 class="text-3xl font-bold text-center text-indigo-400 mb-8">🎮 ยินดีต้อนรับสู่ Game Portal</h1>
            
            <div class="grid md:grid-cols-2 gap-8 divide-y md:divide-y-0 md:divide-x divide-slate-700">
                <div class="space-y-6 pb-6 md:pb-0">
                    <h2 class="text-xl font-semibold text-slate-300">เข้าสู่ระบบ หรือ สมัครสมาชิกใหม่</h2>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">เบอร์โทรศัพท์</label>
                        <input type="tel" id="auth-phone" placeholder="กรอกเบอร์โทรศัพท์" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    
                    <div id="register-fields" class="hidden space-y-4 pt-2 border-t border-slate-700/50">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">ชื่อผู้เล่น</label>
                            <input type="text" id="auth-name" placeholder="ตั้งชื่อของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">สังกัด / หน่วยงาน / ทีม</label>
                            <input type="text" id="auth-affiliation" placeholder="ระบุสังกัดของคุณ" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>

                    <button onclick="handleAuth()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition duration-200">
                        ตรวจสอบข้อมูล / เข้าสู่ระบบ
                    </button>
                </div>

                <div class="space-y-6 pt-6 md:pt-0 md:pl-8">
                    <h2 class="text-xl font-semibold text-red-400">สำหรับผู้ดูแลระบบ (Admin)</h2>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">รหัสผ่านแอดมิน</label>
                        <input type="password" id="admin-pass" placeholder="กรอกรหัสผ่านแอดมิน" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-red-500">
                    </div>
                    <button onclick="loginAdmin()" class="w-full bg-red-600 hover:bg-red-500 text-white font-medium py-2.5 rounded-lg transition duration-200">
                        เข้าสู่ระบบแอดมิน
                    </button>
                </div>
            </div>
        </div>

        <div id="player-view" class="p-8 hidden">
            <div class="flex flex-col md:flex-row md:items-center justify-between border-b border-slate-700 pb-6 mb-6 gap-4">
                <div>
                    <div class="flex items-center gap-3">
                        <h2 class="text-2xl font-bold text-indigo-400" id="player-display-name">ผู้เล่น</h2>
                        <button onclick="toggleEditName()" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-slate-300">เปลี่ยนชื่อ</button>
                    </div>
                    <p class="text-sm text-slate-400 mt-1" id="player-display-affiliation">สังกัด: -</p>
                    <p class="text-xs text-slate-500" id="player-display-phone">เบอร์โทร: -</p>
                    
                    <div id="edit-name-box" class="hidden mt-3 flex gap-2">
                        <input type="text" id="new-name-input" class="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none">
                        <button onclick="saveNewName()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded text-xs font-medium">บันทึก</button>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="bg-slate-700 px-4 py-2 rounded-xl text-center min-w-[100px]">
                        <p class="text-xs text-slate-400">คะแนนสะสม</p>
                        <p class="text-xl font-bold text-amber-400" id="player-score">0</p>
                    </div>
                    <div class="bg-slate-700 px-4 py-2 rounded-xl text-center min-w-[100px]">
                        <p class="text-xs text-slate-400">ด่านปัจจุบัน</p>
                        <p class="text-xl font-bold text-cyan-400" id="player-level">ด่าน 1</p>
                    </div>
                </div>
            </div>

            <h3 class="text-lg font-semibold text-slate-300 mb-6 text-center">🗺️ แผนที่การผจญภัย (กรุณาเล่นเรียงตามลำดับ)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button id="btn-lv1" onclick="playGame(1)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🌲</span>
                    <span>ด่านที่ 1</span>
                    <span class="text-xs font-normal" id="status-lv1">พร้อมเล่น</span>
                </button>
                <button id="btn-lv2" onclick="playGame(2)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🌋</span>
                    <span>ด่านที่ 2</span>
                    <span class="text-xs font-normal" id="status-lv2">ล็อกอยู่</span>
                </button>
                <button id="btn-lv3" onclick="playGame(3)" class="p-6 rounded-xl font-bold flex flex-col items-center justify-center gap-2 transition duration-200 shadow-md">
                    <span class="text-2xl">🧊</span>
                    <span>ด่านที่ 3</span>
                    <span class="text-xs font-normal"
